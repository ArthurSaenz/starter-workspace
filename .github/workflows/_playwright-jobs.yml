name: _playwright-jobs

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      cache_version:
        required: true
        type: string
      project:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-24.04-arm
    env:
      E2E_ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'pnpm'

      - name: Run E2E tests
        run: sh ./devops/scripts/e2e-${{ inputs.project }}.sh

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ inputs.project }}-${{ inputs.environment }}
          path: ./apps/${{ inputs.project }}/tests/playwright-report/
          retention-days: 30
