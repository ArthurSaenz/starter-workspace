name: _deploy-media-jobs

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      environment:
        required: true
        type: string

env:
  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

jobs:
  media:
    runs-on: ubuntu-24.04-arm
    env:
      WORKING_DIRECTORY: ${{ github.event.inputs.workingdir }}
      CI_RUN: ${{ github.event.inputs.ci_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets[format('{0}_{1}', github.event.inputs.environment, 'AWS_ACCESS_KEY_ID')] }}
          aws-secret-access-key: ${{ secrets[format('{0}_{1}', github.event.inputs.environment, 'AWS_SECRET_ACCESS_KEY')] }}
          aws-region: ${{ secrets[format('{0}_{1}', github.event.inputs.environment, 'AWS_REGION')] }}

      - name: Deploy
        run: sh ./devops/scripts/deploy-media.sh

      - name: Notify on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: "Build failed for ${{ github.ref_name }} by ${{ github.actor }}"
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
