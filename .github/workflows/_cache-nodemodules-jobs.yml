name: _cache-nodemodules-jobs

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      cache_version:
        required: true
        type: string

jobs:
  cache:
    name: Cache validation
    runs-on: ubuntu-24.04-arm
    env:
      WORKING_DIRECTORY: ${{ github.event.inputs.workingdir }}
      CI_RUN: ${{ github.event.inputs.ci_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
