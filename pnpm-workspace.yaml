packages:
  - apps/*/*
  - vendor/packages/*
  - vendor/configs/*
  - '!**/test/**'

enableGlobalVirtualStore: true

# Storybook 10 dynamically `import()`s the framework + addons by name from its own dist code.
# Under enableGlobalVirtualStore, storybook's realpath sits outside the project tree, so the
# walk-up never reaches the project root and these can't be resolved. Listing them as optional
# peers makes pnpm symlink them as siblings of storybook in its virtual-store node_modules.
packageExtensions:
  storybook:
    peerDependencies:
      '@storybook/react-vite': '*'
      '@storybook/addon-docs': '*'
      '@storybook/addon-links': '*'
      '@storybook/addon-vitest': '*'
    peerDependenciesMeta:
      '@storybook/react-vite': { optional: true }
      '@storybook/addon-docs': { optional: true }
      '@storybook/addon-links': { optional: true }
      '@storybook/addon-vitest': { optional: true }

catalog:
  '@playwright/test': ^1.59.1
  '@tailwindcss/vite': ^4.2.2

  '@tanstack/react-router': ^1.168.10
  '@tanstack/router-devtools': ^1.166.11
  '@tanstack/router-plugin': ^1.167.12
  '@tanstack/router-vite-plugin': 1.166.27
  '@types/aws-lambda': ^8.10.162
  '@types/node': ^25.9.2
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': 6.0.2
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  date-fns: ^4.1.0

  jotai: 2.20.0
  lucide-react: ^1.17.0
  playwright: ^1.60.0
  react: 19.2.7
  react-dom: 19.2.7
  rollup-plugin-visualizer: ^7.0.0
  sass-embedded: ^1.99.0
  tailwind-merge: ^3.6.0

  tailwindcss: ^4.2.2
  tw-animate-css: ^1.4.0

  typescript: ^6.0.3
  typescript-plugin-css-modules: ^5.2.0

  vite: 8.0.16
  vite-plugin-dts: ^5.0.2
  vite-tsconfig-paths: ^6.1.1
  zod: 3.25.76

supportedArchitectures:
  cpu:
    - arm64
  libc:
    - glibc
  os:
    - darwin
    - linux

strictPeerDependencies: false

publicHoistPattern:
  - '*types*'
  - '*eslint*'
  - '*prettier*'
  - '*stylelint*'
  - '*typescript*'
  - '*config*'
  - '@storybook*'
  - storybook*
  - '*@testing-library*'
  - '*@vitejs*'
  - '*vitest*'
  - '*@vitest*'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msw: true

minimumReleaseAgeExclude:
  - '@slip-stream-kit/*'
  - infra-kit
